<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0D0A08">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tasks</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js" defer></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>
  <script src="config/icons.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div id="app"></div>
  <script>
    // iOS PWA standalone cold-start: window.innerHeight is sometimes ~50px
    // short on first paint and snaps to correct value only after a touch.
    // Pin body to the live innerHeight, re-fit on every event that can change it.
    function fitToViewport() {
      document.body.style.height = window.innerHeight + 'px';
    }
    fitToViewport();
    window.addEventListener('load', fitToViewport);
    window.addEventListener('pageshow', fitToViewport);
    window.addEventListener('resize', fitToViewport);
    window.addEventListener('orientationchange', () => requestAnimationFrame(fitToViewport));
    document.addEventListener('visibilitychange', () => { if (!document.hidden) fitToViewport(); });
    // Cold-start retries — iOS sometimes reports wrong innerHeight until next frame
    requestAnimationFrame(fitToViewport);
    setTimeout(fitToViewport, 100);
    setTimeout(fitToViewport, 500);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
