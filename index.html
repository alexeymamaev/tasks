<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <script>
    // iOS PWA standalone cold-start: WebKit's layout viewport reads short by
    // ~34px (home-indicator inset) until first touch. innerHeight and
    // visualViewport.height both inherit this short value. screen.height
    // bypasses that — it's the device's physical CSS-pixel height and is
    // stable from first paint. We use the larger of the two for --app-height
    // so #app is never short on cold-start; once WebKit settles, measured
    // climbs to match screen.height and the value stops moving.
    (function () {
      function setH() {
        var measured = (window.visualViewport && window.visualViewport.height) || window.innerHeight || 0;
        var screenH = (window.screen && window.screen.height) || 0;
        var h = Math.max(measured, screenH);
        document.documentElement.style.setProperty('--app-height', h + 'px');
      }
      setH();
      window.addEventListener('resize', setH);
      window.addEventListener('orientationchange', setH);
      window.addEventListener('pageshow', setH);
      window.addEventListener('load', setH);
      window.addEventListener('touchstart', setH, { passive: true, once: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setH);
        window.visualViewport.addEventListener('scroll', setH);
      }
      // After WebKit's load+pageshow settle, force a tiny programmatic scroll
      // on a temporarily-tall body. This kicks WebKit into reconciling the
      // standalone layout viewport BEFORE the user has to pull, so position:
      // fixed elements (the tab bar) anchor to the correct bottom edge from
      // the first paint a human will see.
      function nudgeScroll() {
        var prev = document.body.style.minHeight;
        document.body.style.minHeight = '200vh';
        window.scrollTo(0, 1);
        requestAnimationFrame(function () {
          window.scrollTo(0, 0);
          document.body.style.minHeight = prev;
          setH();
        });
      }
      window.addEventListener('load', function () {
        requestAnimationFrame(function () { requestAnimationFrame(nudgeScroll); });
      });
    })();
  </script>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0D0A08">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tasks">
  <title>Tasks</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js" defer></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>
  <script src="config/icons.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="bg-fill"></div>
  <div id="app"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
      // When a new SW takes over (after we bumped CACHE in sw.js), the rendered
      // page is still using the OLD cached assets — clientsClaim doesn't
      // re-fetch them. Reload once on controller change so the new style.css
      // / app.js / index.html actually render. Guard against reload loops.
      var reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
